<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career — Brighten</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/career.css" />
</head>
<body>

  <nav>
    <a href="home.html" class="nav-brand">
      <img src="../assets/Brighten-logo.png" alt="Brighten" class="logo-img" />
      <span class="nav-tagline">For Bright<br>Futures</span>
    </a>
    <div class="nav-links">
      <a href="careers.html" class="btn-back" data-i18n="nav.careers_arrow">← Careers</a>
    </div>
  </nav>

  <div id="career-hero" class="career-hero"></div>
  <div id="career-does" class="detail-section"></div>
  <div id="career-facts" class="facts-section"></div>
  <div id="career-cta" class="scan-cta"></div>

  <script src="../js/i18n.js"></script>
  <script>
    
    const DOES_ICONS = {
      programmer: ['🖥️', '🎮', '🐛'],
      police:     ['🚔', '🔍', '🤝'],
      teacher:    ['📝', '🗣️', '⭐'],
      farmer:     ['🌱', '🚜', '☀️'],
      doctor:     ['🔬', '💊', '🏥'],
      astroner:   ['🛸', '🔭', '🧑‍🚀'],
    };

    const CAREERS = {
      programmer: { img: '../assets/characters/char-programmer.png', name: 'Programmer', tag: 'Technology', tagKey: 'technology' },
      police:     { img: '../assets/characters/char-police.png',     name: 'Police Officer', tag: 'Public Safety', tagKey: 'public_safety' },
      teacher:    { img: '../assets/characters/char-teacher.png',    name: 'Teacher',        tag: 'Education',     tagKey: 'education' },
      farmer:     { img: '../assets/characters/char-farmer.png',     name: 'Farmer',         tag: 'Agriculture',   tagKey: 'agriculture' },
      doctor:     { img: '../assets/characters/char-doctor.png',     name: 'Doctor',         tag: 'Healthcare',    tagKey: 'healthcare' },
      astroner:   { img: '../assets/characters/char-astronaut.png',  name: 'Astronaut',      tag: 'Space',         tagKey: 'space' },
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || 'programmer';
    const c = CAREERS[id] || CAREERS['programmer'];
    const effectiveId = id === 'astroner' ? 'astronaut' : id;
    const initName = (typeof I18N !== 'undefined') ? I18N.t('career.' + effectiveId) : null;
    document.title = `${initName || c.name} — Brighten`;

    function renderCareer() {
      const t = (typeof I18N !== 'undefined') ? I18N.t : (k) => k;

      const cId = id === 'astroner' ? 'astronaut' : id;
      const localizedName = t('career.' + cId, null) || c.name;
      const localizedTag = t('tag.' + c.tagKey, null) || c.tag;

      
      const intro = t('intro.' + cId, null) || '';

      
      const icons = DOES_ICONS[id] || ['📌', '📌', '📌'];
      const does = icons.map((icon, i) => {
        const title = t('does.do_title.' + cId + '.' + i, null) || '';
        const desc = t('does.do_desc.' + cId + '.' + i, null) || '';
        return { icon, title, desc };
      });

      
      const facts = [0, 1, 2].map(i => t('fact.' + cId + '.' + i, null) || '');

      document.getElementById('career-hero').innerHTML = `
        <img src="${c.img}" class="career-hero-img" />
        <h1>${localizedName}</h1>
        <span class="career-tag">${localizedTag}</span>
        <p class="career-intro">${intro}</p>
      `;

      document.getElementById('career-does').innerHTML = `
        <h2>${t('career.does', { name: localizedName }).replace(/\ba(?= [AEIOUaeiou])/, 'an')}</h2>
        <div class="do-list">
          ${does.map(d => `
            <div class="do-item">
              <span class="do-icon">${d.icon}</span>
              <div class="do-text">
                <strong>${d.title}</strong>
                <span>${d.desc}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      document.getElementById('career-facts').innerHTML = `
        <h2>${t('career.facts', null)}</h2>
        <div class="facts-list">
          ${facts.map(f => `<div class="fact-item">${f}</div>`).join('')}
        </div>
      `;

      document.getElementById('career-cta').innerHTML = `
        <p>${t('career.cta', { name: localizedName })}</p>
        <a href="ar.html" class="btn-scan-big">${t('career.cta_btn', null)}</a>
      `;
    }

    
    function waitAndRender() {
      
      if (typeof I18N !== 'undefined' && I18N.getLocale) {
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function onDcl() {
            document.removeEventListener('DOMContentLoaded', onDcl);
            renderCareer();
          });
        } else {
          renderCareer();
        }
      } else {
        setTimeout(waitAndRender, 10);
      }
    }
    waitAndRender();

    
    window.addEventListener('localechange', renderCareer);
  </script>

</body>
</html>
