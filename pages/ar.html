<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Your Toy - Brighten</title>

  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/ar.css" />
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* ── TOP BAR ─────────────────────────────────────────── */
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.45);
    }

    #top-bar a, #test-mode-btn {
      color: white;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.2s;
    }

    #top-bar a:hover, #test-mode-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    #top-bar .logo-img { height: 32px; width: auto; }

    /* ── SCANNING HINT ───────────────────────────────────── */
    #hint {
      position: fixed;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: rgba(0,0,0,0.6);
      color: white;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      white-space: nowrap;
      transition: opacity 0.5s;
    }

    /* ── AR SCENE ────────────────────────────────────────── */
    #ar-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* ── BOTTOM CHAT PANEL ───────────────────────────────── */
    /* Floats above the AR camera — camera stays fully visible */
    #chat-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(255,255,255,0.97);
      border-radius: 24px 24px 0 0;
      border-top: 3px solid var(--coral);
      padding: 14px 16px 20px;
      max-height: 52vh;
      display: none;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.15);
    }

    #chat-panel.show { display: flex; }

    /* drag handle */
    #chat-panel::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      background: rgba(0,0,0,0.15);
      border-radius: 2px;
      margin: 0 auto 4px;
      flex-shrink: 0;
    }

    .chat-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--coral);
      background: var(--cream);
    }

    .chat-header-info h3 {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 800;
      color: var(--dark);
      margin: 0;
    }

    .chat-status {
      font-size: 11px;
      color: #6BCB77;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #6BCB77;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    .chat-close-btn {
      margin-left: auto;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f0f0f0;
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .chat-close-btn:active { background: var(--coral); color: white; }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 2px 0;
    }

    .message {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      font-family: var(--font-body);
    }

    .message.user {
      align-self: flex-end;
      background: var(--coral);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #F0F0F0;
      color: var(--dark);
      border-bottom-left-radius: 4px;
    }

    .message.typing { color: #aaa; font-style: italic; }

    #chat-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }

    .preset-btn {
      background: #FFF8E1;
      color: #92620A;
      border: 1.5px solid var(--yellow);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .preset-btn:active { background: var(--yellow); }

    #chat-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    #chat-input:focus { border-color: var(--coral); }

    #chat-send {
      padding: 10px 18px;
      background: var(--coral);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #chat-send:active { background: #e05555; }

    /* ── TEST MODE PANEL ─────────────────────────────────── */
    #test-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      z-index: 250;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    #test-backdrop.show { opacity: 1; pointer-events: auto; }

    #test-mode-panel {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px) scale(0.92);
      z-index: 300;
      background: rgba(255,255,255,0.98);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      display: none;
      max-width: 340px;
      width: 90%;
      border: 2px solid var(--dark);
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #test-mode-panel.show {
      display: block;
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      pointer-events: auto;
    }

    .test-panel-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--dark);
      text-align: center;
      margin-bottom: 16px;
    }

    .test-career-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .test-career-card {
      padding: 14px 8px;
      border: 2px solid var(--dark);
      border-radius: 14px;
      background: white;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--dark);
      text-align: center;
      transition: all 0.15s;
    }

    .test-career-card:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--dark);
    }

    .test-career-emoji { font-size: 26px; display: block; margin-bottom: 6px; }
    .test-career-name  { font-size: 13px; font-weight: 700; color: var(--dark); }

    .test-panel-close {
      width: 100%;
      padding: 10px;
      background: #f0f0f0;
      border: 2px solid var(--dark);
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      box-shadow: 3px 3px 0 var(--dark);
      transition: all 0.15s;
    }

    .test-panel-close:active {
      background: var(--dark);
      color: white;
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--dark);
    }
  </style>

</head>

  <script>
    (function () {
      'use strict';

      const CAREER_IMGS = {
        programmer: '../assets/characters/char-programmer.png',
        police:     '../assets/characters/char-police.png',
        teacher:    '../assets/characters/char-teacher.png',
        farmer:     '../assets/characters/char-farmer.png',
        doctor:     '../assets/characters/char-doctor.png',
        astronaut:  '../assets/characters/char-astronaut.png',
      };

      const hint        = document.getElementById('hint');
      const chatPanel   = document.getElementById('chat-panel');
      const chatAvatar  = document.getElementById('chat-avatar');
      const chatClose   = document.getElementById('chat-close');
      const testBtn     = document.getElementById('test-mode-btn');
      const testPanel   = document.getElementById('test-mode-panel');
      const testBackdrop = document.getElementById('test-backdrop');
      const closeTest   = document.getElementById('close-test-panel');

      // ── SHOW / HIDE CHAT PANEL ────────────────────────────
      function showChat(career) {
        chatAvatar.src = CAREER_IMGS[career.id] || '';
        hint.style.opacity = '0';
        chatPanel.classList.add('show');

        if (typeof initChat === 'function') {
          initChat(career);
        }
      }

      function hideChat() {
        chatPanel.classList.remove('show');
        hint.style.opacity = '1';
      }

      chatClose.addEventListener('click', hideChat);

      // ── AR HANDLERS (called by ar.js) ─────────────────────
      window.onCareerFound = function (career) {
        showChat(career);
      };

      window.onCareerLost = function () {
        hideChat();
      };

      // ── TEST MODE ─────────────────────────────────────────
      function openTestPanel() {
        testBackdrop.classList.add('show');
        testPanel.style.display = 'block';
        setTimeout(() => testPanel.classList.add('show'), 10);
      }

      function closeTestPanel() {
        testBackdrop.classList.remove('show');
        testPanel.classList.remove('show');
        setTimeout(() => {
          if (!testPanel.classList.contains('show')) testPanel.style.display = 'none';
        }, 300);
      }

      testBtn.addEventListener('click', openTestPanel);
      closeTest.addEventListener('click', closeTestPanel);
      testBackdrop.addEventListener('click', closeTestPanel);

      document.querySelectorAll('.test-career-card').forEach(card => {
        card.addEventListener('click', () => {
          const career = JSON.parse(card.dataset.career);
          closeTestPanel();
          showChat(career);
        });
      });

      // ESC to close
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          if (testPanel.classList.contains('show')) closeTestPanel();
          else hideChat();
        }
      });

    })();
  </script>
