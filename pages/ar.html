<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Your Toy - Brighten</title>

  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/ar.css" />
  <link rel="stylesheet" href="../css/transition.css" />
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    #test-mode-btn {
      background: rgba(255,255,255,0.15) !important;
      color: white !important;
      border: 1px solid rgba(255,255,255,0.3) !important;
      padding: 6px 12px !important;
      border-radius: 20px !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      font-family: var(--font-body) !important;
      transition: background 0.2s !important;
      text-decoration: none !important;
      display: inline-flex !important;
      align-items: center !important;
      gap: 4px !important;
    }
    #test-mode-btn:hover { background: rgba(255,255,255,0.25) !important; }

    #test-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      z-index: 250; opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #test-backdrop.show { opacity: 1; pointer-events: auto; }

    #test-mode-panel {
      position: fixed; top: max(70px, calc(env(safe-area-inset-top) + 10px)); left: 50%;
      z-index: 300;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(10px);
      border-radius: 24px; padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      display: none; max-width: 360px; width: 90%;
      max-height: calc(100dvh - 120px); overflow-y: auto;
      border: 2px solid var(--dark); opacity: 0;
      transform: translateX(-50%) translateY(-8px) scale(0.92);
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #test-mode-panel.show {
      display: block; opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      pointer-events: auto;
    }
    .test-panel-title {
      margin-bottom: 20px;
      font-family: var(--font-display);
      font-size: 20px; font-weight: 800;
      color: var(--dark); text-align: center;
    }
    .test-career-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; margin-bottom: 20px;
    }
    .test-career-card {
      padding: 16px 10px; border: 2px solid var(--dark);
      border-radius: 16px; background: white; cursor: pointer;
      box-shadow: 4px 4px 0 var(--dark); text-align: center;
      transition: box-shadow 0.12s, transform 0.12s;
      animation: careerCardPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }
    .test-career-card:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--dark); }
    .test-career-card:active { transform: scale(0.95) translateY(2px); box-shadow: 2px 2px 0 var(--dark); }
    .test-career-emoji { font-size: 28px; display: block; margin-bottom: 8px; }
    .test-career-name  { font-size: 14px; font-weight: 700; color: var(--dark); }
    .test-panel-close {
      width: 100%; padding: 12px;
      background: #f0f0f0; border: 2px solid var(--dark);
      border-radius: 20px; cursor: pointer;
      font-family: var(--font-body); font-size: 14px; font-weight: 700;
      box-shadow: 3px 3px 0 var(--dark); transition: all 0.15s;
    }
    .test-panel-close:hover { background: var(--dark); color: white; }
    #test-mode-panel.show .test-career-card:nth-child(1) { animation-delay: 0.02s; }
    #test-mode-panel.show .test-career-card:nth-child(2) { animation-delay: 0.06s; }
    #test-mode-panel.show .test-career-card:nth-child(3) { animation-delay: 0.10s; }
    #test-mode-panel.show .test-career-card:nth-child(4) { animation-delay: 0.14s; }
    #test-mode-panel.show .test-career-card:nth-child(5) { animation-delay: 0.18s; }
    #test-mode-panel.show .test-career-card:nth-child(6) { animation-delay: 0.22s; }
    @keyframes careerCardPop {
      from { opacity:0; transform: translateX(-12px) scale(0.9); }
      to   { opacity:1; transform: translateX(0) scale(1); }
    }

    /* ── BOTTOM CHAT PANEL ── FULLSCREEN VISUAL STYLE ── */
    #chat-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--cream);
      border-radius: 24px 24px 0 0;
      border-top: 3px solid var(--dark);
      padding: 16px 18px;
      max-height: 52vh;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    #chat-panel.show { display: flex; }

    .chat-panel-header {
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .chat-panel-header .chat-header-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--dark);
      box-shadow: 3px 3px 0 var(--dark);
      background: var(--cream); flex-shrink: 0;
    }
    .chat-header-info { flex: 1; min-width: 0; }
    #chat-character-name {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      color: var(--dark); margin: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-header-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 600;
    }
    .chat-header-status span { color: #4CAF50; }
    .room-name {
      font-size: 12px; color: #666; font-weight: 500;
    }

    .chat-close-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: white; border: 3px solid var(--dark);
      display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; cursor: pointer;
      font-size: 18px; font-weight: 700; color: var(--dark);
      box-shadow: 3px 3px 0 var(--dark);
      transition: all 0.2s;
    }
    .chat-close-btn:hover {
      transform: translate(-2px,-2px);
      box-shadow: 5px 5px 0 var(--dark);
      background: var(--coral); color: white;
    }
    .chat-close-btn:active {
      transform: translate(2px,2px);
      box-shadow: 1px 1px 0 var(--dark);
    }

    /* Messages in bottom panel - fullscreen visual style */
    #chat-messages {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
      gap: 12px; padding: 4px 2px;
      scrollbar-width: thin;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--dark); border-radius: 10px; }

    #chat-messages .message {
      max-width: 78%;
      padding: 14px 18px;
      border-radius: 24px;
      font-size: 17px;
      line-height: 1.6;
      font-family: var(--font-body);
    }
    #chat-messages .message.user {
      align-self: flex-end;
      background: var(--coral);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 4px 4px 0 var(--dark);
    }
    #chat-messages .message.assistant {
      align-self: flex-start;
      background: white;
      color: var(--dark);
      border-bottom-left-radius: 6px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
      border: 2px solid var(--dark);
    }
    #chat-messages .message.assistant.typing-indicator-container {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
    }
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: white;
      border-radius: 24px;
      border: 2px solid var(--dark);
      border-bottom-left-radius: 6px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
      max-width: 70px;
    }
    .typing-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--dark);
      opacity: 0.4;
      animation: typingDot 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%,60%,100% { transform:translateY(0); opacity:0.4; }
      30% { transform:translateY(-8px); opacity:1; }
    }

    #chat-presets {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 6px;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 2px 0;
    }
    #chat-presets::-webkit-scrollbar { display: none; }
    #chat-presets .preset-btn {
      flex-shrink: 0; white-space: nowrap;
    }
    #chat-input-row {
      display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }
    #chat-input {
      flex: 1; padding: 12px 18px;
      border: 3px solid var(--dark); border-radius: 24px;
      font-size: 16px; font-family: var(--font-body);
      outline: none; background: white;
      transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: var(--coral); }
    #chat-send {
      padding: 12px 24px; background: var(--coral);
      color: white; border: 3px solid var(--dark);
      border-radius: 24px;
      font-size: 16px; font-family: var(--font-body);
      font-weight: 700; cursor: pointer;
      box-shadow: 3px 3px 0 var(--dark);
      transition: all 0.15s; flex-shrink: 0;
    }
    #chat-send:active {
      transform: translate(2px,2px);
      box-shadow: 1px 1px 0 var(--dark);
      background: #e05555;
    }
    #chat-send:disabled { opacity: 0.6; }

    /* ── FULLSCREEN CHAT (Test mode) — OLD VISUAL STYLE ── */
    #fullscreen-chat {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--cream);
      display: none;
      flex-direction: column;
    }
    #fullscreen-chat.active { display: flex; }

    .chat-full-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px;
      background: white;
      border-bottom: 3px solid var(--dark);
      flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    #fullscreen-chat .chat-header-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 3px solid var(--dark);
      box-shadow: 3px 3px 0 var(--dark);
      object-fit: cover;
    }
    .chat-full-header h3 {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 800;
      color: var(--dark); margin: 0 0 4px;
    }
    .chat-full-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: white;
      border: 3px solid var(--dark);
      display: flex; align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px; font-weight: 700;
      color: var(--dark);
      transition: all 0.2s;
      box-shadow: 3px 3px 0 var(--dark);
      z-index: 10;
      flex-shrink: 0;
    }
    .chat-full-close:hover {
      transform: translate(-2px,-2px);
      box-shadow: 5px 5px 0 var(--dark);
      background: var(--coral);
      color: white;
    }

    .chat-full-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 600;
    }
    .chat-full-status span { color: #4CAF50; }
    .chat-full-status .status-dot {
      width: 10px; height: 10px;
    }

    #fullscreen-messages {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
      gap: 16px; padding: 24px;
      background: linear-gradient(180deg, #f8f9fa 0%, #fff 100%);
    }
    #fullscreen-messages::-webkit-scrollbar { width: 6px; }
    #fullscreen-messages::-webkit-scrollbar-track { background: transparent; }
    #fullscreen-messages::-webkit-scrollbar-thumb { background: var(--dark); border-radius: 10px; }

    #fullscreen-messages .message {
      max-width: 70%;
      padding: 16px 20px;
      border-radius: 24px;
      font-size: 17px;
      line-height: 1.6;
      font-family: var(--font-body);
    }
    #fullscreen-messages .message.user {
      align-self: flex-end;
      background: var(--coral);
      color: white;
      border-bottom-right-radius: 6px;
      box-shadow: 4px 4px 0 var(--dark);
    }
    #fullscreen-messages .message.assistant {
      align-self: flex-start;
      background: white;
      color: var(--dark);
      border-bottom-left-radius: 6px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
      border: 2px solid var(--dark);
    }
    #fullscreen-messages .message.assistant.typing-indicator-container {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
    }

    .chat-full-input-area {
      padding: 20px 24px;
      background: white;
      border-top: 3px solid var(--dark);
      flex-shrink: 0;
    }

    #fullscreen-presets {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    #fullscreen-presets::-webkit-scrollbar { display: none; }
    #fullscreen-presets .preset-btn {
      flex-shrink: 0;
      white-space: nowrap;
    }
    #fullscreen-presets .preset-btn {
      background: #FFF8E1;
      color: #92620A;
      border: 2px solid #FFD93D;
      border-radius: 30px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    #fullscreen-presets .preset-btn:active { background: var(--yellow); }

    .chat-full-input-row {
      display: flex; gap: 12px; align-items: center;
    }
    #fullscreen-input {
      flex: 1; padding: 16px 20px;
      border: 3px solid var(--dark);
      border-radius: 40px;
      font-size: 17px;
      font-family: var(--font-body);
      outline: none;
      background: #fafafa;
      transition: all 0.2s;
      box-shadow: 3px 3px 0 var(--dark);
    }
    #fullscreen-input:focus {
      border-color: var(--coral);
      box-shadow: 4px 4px 0 var(--coral);
      transform: translate(-1px, -1px);
    }
    #fullscreen-send {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--coral);
      color: white;
      border: 3px solid var(--dark);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 4px 4px 0 var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #fullscreen-send:hover {
      transform: translate(-2px,-2px);
      box-shadow: 6px 6px 0 var(--dark);
      background: #ff5252;
    }
    #fullscreen-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: 4px 4px 0 var(--dark);
    }

    /* Chat header actions (fix overlap) */
    .chat-full-header {
      position: relative;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div id="top-bar">
    <a href="home.html" data-i18n="nav.home_arrow">← Home</a>
    <img src="../assets/Brighten-logo.png" alt="Brighten" class="logo-img" />
    <div style="display:flex;gap:8px;align-items:center">
      <button id="test-mode-btn" data-i18n="ar.test_btn">💬 Chat</button>
      <a href="careers.html" data-i18n="nav.careers">Careers</a>
    </div>
  </div>

  <!-- Test Backdrop -->
  <div class="test-backdrop" id="test-backdrop"></div>

  <!-- Test Mode Panel -->
  <div id="test-mode-panel">
    <div class="test-panel-title" data-i18n="ar.test_title">💬 Who would you like to chat with?</div>
    <div class="test-career-grid">
      <div class="test-career-card" data-career='{"id":"programmer","name":"Programmer","img":"../assets/characters/char-programmer.png"}'>
        <span class="test-career-emoji">💻</span>
        <span class="test-career-name" data-i18n="career.programmer">Programmer</span>
      </div>
      <div class="test-career-card" data-career='{"id":"police","name":"Police Officer","img":"../assets/characters/char-police.png"}'>
        <span class="test-career-emoji">👮</span>
        <span class="test-career-name" data-i18n="career.police">Police</span>
      </div>
      <div class="test-career-card" data-career='{"id":"teacher","name":"Teacher","img":"../assets/characters/char-teacher.png"}'>
        <span class="test-career-emoji">📚</span>
        <span class="test-career-name" data-i18n="career.teacher">Teacher</span>
      </div>
      <div class="test-career-card" data-career='{"id":"farmer","name":"Farmer","img":"../assets/characters/char-farmer.png"}'>
        <span class="test-career-emoji">🌾</span>
        <span class="test-career-name" data-i18n="career.farmer">Farmer</span>
      </div>
      <div class="test-career-card" data-career='{"id":"doctor","name":"Doctor","img":"../assets/characters/char-doctor.png"}'>
        <span class="test-career-emoji">👨‍⚕️</span>
        <span class="test-career-name" data-i18n="career.doctor">Doctor</span>
      </div>
      <div class="test-career-card" data-career='{"id":"astronaut","name":"Astronaut","img":"../assets/characters/char-astronaut.png"}'>
        <span class="test-career-emoji">🚀</span>
        <span class="test-career-name" data-i18n="career.astronaut">Astronaut</span>
      </div>
    </div>
    <button class="test-panel-close" id="close-test-panel" data-i18n="ar.cancel">Cancel</button>
  </div>

  <!-- Scanning Hint -->
  <div id="hint" data-i18n="ar.hint">📷 Point at your toy to scan</div>

  <!-- AR SCENE -->
  <div id="ar-container">
    <a-scene
      mindar-image="imageTargetSrc: ../assets/targets.mind; filterMinCF: 0.001; filterBeta: 0.01; warmupTolerance: 5; missTolerance: 999999"
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true"
      device-orientation-permission-ui="enabled: false"
    >
      <a-entity mindar-image-target="targetIndex: 0" id="ar-target-0">
        <a-image src="../assets/characters/char-programmer.png"
          position="0 0.5 0" width="1" height="1.5"
          animation__enter="property: position; from: 0 -0.3 0; to: 0 0.5 0; dur: 600; easing: easeOutBack; startEvents: null"
          animation__bob="property: position; from: 0 0.5 0; to: 0 0.65 0; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
          animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack">
        </a-image>
        <a-circle position="0 0.01 0" rotation="-90 0 0"
          radius="0.4" color="#000000" opacity="0.2"
          scale="1 0.6 1"
          animation__shadow="property: scale; from: 0 0 0; to: 1 0.6 1; dur: 500; easing: easeOutBack">
        </a-circle>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1" id="ar-target-1">
        <a-image src="../assets/characters/char-police.png"
          position="0 0.5 0" width="1" height="1.5"
          animation__bob="property: position; from: 0 0.5 0; to: 0 0.65 0; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
          animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack">
        </a-image>
        <a-circle position="0 0.01 0" rotation="-90 0 0"
          radius="0.4" color="#000000" opacity="0.2"
          scale="1 0.6 1"
          animation__shadow="property: scale; from: 0 0 0; to: 1 0.6 1; dur: 500; easing: easeOutBack">
        </a-circle>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2" id="ar-target-2">
        <a-image src="../assets/characters/char-teacher.png"
          position="0 0.5 0" width="1" height="1.5"
          animation__bob="property: position; from: 0 0.5 0; to: 0 0.65 0; dur: 2200; dir: alternate; loop: true; easing: easeInOutSine"
          animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack">
        </a-image>
        <a-circle position="0 0.01 0" rotation="-90 0 0"
          radius="0.4" color="#000000" opacity="0.2"
          scale="1 0.6 1"
          animation__shadow="property: scale; from: 0 0 0; to: 1 0.6 1; dur: 500; easing: easeOutBack">
        </a-circle>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3" id="ar-target-3">
        <a-image src="../assets/characters/char-farmer.png"
          position="0 0.5 0" width="1" height="1.5"
          animation__bob="property: position; from: 0 0.5 0; to: 0 0.65 0; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine"
          animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack">
        </a-image>
        <a-circle position="0 0.01 0" rotation="-90 0 0"
          radius="0.4" color="#000000" opacity="0.2"
          scale="1 0.6 1"
          animation__shadow="property: scale; from: 0 0 0; to: 1 0.6 1; dur: 500; easing: easeOutBack">
        </a-circle>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 4" id="ar-target-4">
        <a-image src="../assets/characters/char-doctor.png"
          position="0 0.5 0" width="1" height="1.5"
          animation__bob="property: position; from: 0 0.5 0; to: 0 0.65 0; dur: 2100; dir: alternate; loop: true; easing: easeInOutSine"
          animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack">
        </a-image>
        <a-circle position="0 0.01 0" rotation="-90 0 0"
          radius="0.4" color="#000000" opacity="0.2"
          scale="1 0.6 1"
          animation__shadow="property: scale; from: 0 0 0; to: 1 0.6 1; dur: 500; easing: easeOutBack">
        </a-circle>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 5" id="ar-target-5">
        <a-image src="../assets/characters/char-astronaut.png"
          position="0 0.5 0" width="1" height="1.5"
          animation__bob="property: position; from: 0 0.5 0; to: 0 0.65 0; dur: 2400; dir: alternate; loop: true; easing: easeInOutSine"
          animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack">
        </a-image>
        <a-circle position="0 0.01 0" rotation="-90 0 0"
          radius="0.4" color="#000000" opacity="0.2"
          scale="1 0.6 1"
          animation__shadow="property: scale; from: 0 0 0; to: 1 0.6 1; dur: 500; easing: easeOutBack">
        </a-circle>
      </a-entity>
      <a-camera position="0 0 0"></a-camera>
    </a-scene>
  </div>

  <!-- TRANSITION OVERLAY -->
  <div id="transition-overlay">
    <div class="transition-bg">
      <div class="transition-orb"></div>
      <div class="transition-orb"></div>
      <div class="transition-orb"></div>
    </div>
    <div id="transition-sparkles"></div>
    <div class="transition-character">
      <img id="transition-char-img" class="transition-character-img" src="" alt="">
      <h2 id="transition-char-name" class="transition-career-name"></h2>
      <span id="transition-char-tag" class="transition-career-tag"></span>
    </div>
    <div class="transition-loading">
      <div class="loading-text">
        <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
      </div>
      <div class="loading-bar-container">
        <div class="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM CHAT PANEL — AR camera stays visible above -->
  <div id="chat-panel">
    <div class="chat-panel-header">
      <img id="chat-panel-avatar" class="chat-header-avatar" src="" alt="" />
      <div class="chat-header-info">
        <h3 id="chat-character-name"></h3>
        <div class="chat-header-status">
          <span class="status-dot"></span>
          <span data-i18n="ar.online">Online • Ready to chat!</span>
        </div>
      </div>
      <button class="chat-close-btn" id="chat-close">✕</button>
    </div>

    <div id="chat-messages"></div>
    <div id="chat-presets"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Ask me anything..." data-i18n-placeholder="chat.placeholder" />
      <button id="chat-send">Send</button>
    </div>
  </div>

  <!-- FULLSCREEN CHAT (Test mode) -->
  <div id="fullscreen-chat">
    <div class="chat-full-header">
      <div class="chat-header-left">
        <img id="fs-avatar" class="chat-header-avatar" src="" alt="" />
        <div class="chat-header-info">
          <h3 id="fs-career-name"></h3>
          <div class="chat-full-status">
            <span class="status-dot"></span>
            <span data-i18n="ar.online">Online • Ready to chat!</span>
          </div>
        </div>
      </div>
      <button class="chat-full-close" id="fs-close">✕</button>
    </div>
    <div id="fullscreen-messages" class="chat-full-messages"></div>
    <div class="chat-full-input-area">
      <div id="fullscreen-presets" class="chat-full-presets"></div>
      <div class="chat-full-input-row">
        <input type="text" id="fullscreen-input" class="chat-full-input" placeholder="Ask me anything..." />
        <button id="fullscreen-send" class="chat-full-send">📤</button>
      </div>
    </div>
  </div>

  <!-- chat-ui hidden shim for chat.js compatibility -->
  <div id="chat-ui" style="display:none"></div>

  <script src="../js/ar.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/chat.js"></script>

  <script>
    (function () {
      'use strict';

      const CAREER_DATA = {
        programmer: { img: '../assets/characters/char-programmer.png' },
        police:     { img: '../assets/characters/char-police.png' },
        teacher:    { img: '../assets/characters/char-teacher.png' },
        farmer:     { img: '../assets/characters/char-farmer.png' },
        doctor:     { img: '../assets/characters/char-doctor.png' },
        astronaut:  { img: '../assets/characters/char-astronaut.png' },
      };

      function getCareerName(id) {
        return (typeof I18N !== 'undefined') ? (I18N.t('career.' + id, null) || id) : id;
      }

      function getCareerTag(id) {
        const tags = {
          programmer: 'tag.technology', police: 'tag.public_safety',
          teacher: 'tag.education', farmer: 'tag.agriculture',
          doctor: 'tag.healthcare', astronaut: 'tag.space'
        };
        return (typeof I18N !== 'undefined' && tags[id]) ? I18N.t(tags[id], null) : '';
      }

      let isTransitioning = false;
      let currentCareerId = null;
      let lostTimer = null;

      // DOM refs — bottom panel
      const hint            = document.getElementById('hint');
      const chatPanel       = document.getElementById('chat-panel');
      const chatPanelAvatar = document.getElementById('chat-panel-avatar');
      const chatClose       = document.getElementById('chat-close');

      // DOM refs — fullscreen chat
      // DOM refs — fullscreen chat (test mode)
      const fullscreenChat  = document.getElementById('fullscreen-chat');
      const fsAvatar        = document.getElementById('fs-avatar');
      const fsCareerName    = document.getElementById('fs-career-name');
      const fsClose         = document.getElementById('fs-close');
      const fsMessages      = document.getElementById('fullscreen-messages');
      const fsPresets       = document.getElementById('fullscreen-presets');
      const fsInput         = document.getElementById('fullscreen-input');
      const fsSend          = document.getElementById('fullscreen-send');

      // DOM refs — transition
      const transOverlay    = document.getElementById('transition-overlay');
      const transCharImg    = document.getElementById('transition-char-img');
      const transCharName   = document.getElementById('transition-char-name');
      const transCharTag    = document.getElementById('transition-char-tag');
      const sparklesCont    = document.getElementById('transition-sparkles');

      // DOM refs — test panel
      const testBtn         = document.getElementById('test-mode-btn');
      const testPanel       = document.getElementById('test-mode-panel');
      const testBackdrop    = document.getElementById('test-backdrop');
      const closeTestBtn    = document.getElementById('close-test-panel');

      // ── TRANSITION ──────────────────────────────────────────
      function createSparkles() {
        sparklesCont.innerHTML = '';
        const emojis = ['✨','⭐','🌟','💫','🎈','🎉','💖','🌈'];
        for (let i = 0; i < 30; i++) {
          const s = document.createElement('div');
          s.className = 'transition-sparkle';
          s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          s.style.left = Math.random() * 100 + '%';
          s.style.top  = Math.random() * 100 + '%';
          s.style.animationDelay = Math.random() * 2 + 's';
          s.style.fontSize = (16 + Math.random() * 30) + 'px';
          sparklesCont.appendChild(s);
        }
      }

      async function showTransition(career) {
        return new Promise(resolve => {
          isTransitioning = true;
          const data = CAREER_DATA[career.id] || {};
          transCharImg.src = data.img || '';
          transCharName.textContent = getCareerName(career.id);
          transCharTag.textContent  = getCareerTag(career.id);
          createSparkles();
          transOverlay.classList.add('active');
          hint.style.opacity = '0';
          setTimeout(() => {
            transOverlay.classList.remove('active');
            isTransitioning = false;
            resolve();
          }, 2800);
        });
      }

      // ── BOTTOM HALF-SCREEN CHAT (AR scan mode) ──────────────
      function showBottomChat(career) {
        currentCareerId = career.id;
        const data = CAREER_DATA[career.id] || {};
        chatPanelAvatar.src = data.img || '';
        chatPanel.classList.add('show');
        const localCareer = { ...career, name: getCareerName(career.id) };
        if (typeof initChat === 'function') initChat(localCareer);
      }

      function hideBottomChat() {
        chatPanel.classList.remove('show');
        hint.style.opacity = '1';
        currentCareerId = null;
      }

      chatClose.addEventListener('click', hideBottomChat);

      // ── FULLSCREEN CHAT (Test mode) ──────────────────────────
      function showFullscreenChat(career) {
        const data = CAREER_DATA[career.id] || {};
        fsAvatar.src = data.img || '';
        fsCareerName.textContent = getCareerName(career.id);
        fullscreenChat.classList.add('active');
        remapChatIds('fullscreen');
        const localCareer = { ...career, name: getCareerName(career.id) };
        if (typeof initChat === 'function') initChat(localCareer);
      }

      function hideFullscreenChat() {
        fullscreenChat.classList.remove('active');
        remapChatIds('panel');
      }

      fsClose.addEventListener('click', hideFullscreenChat);

      function remapChatIds(mode) {
        const orig = document.__origGetById || document.getElementById.bind(document);
        document.__origGetById = orig;
        if (mode === 'fullscreen') {
          const map = {
            'chat-messages':       'fullscreen-messages',
            'chat-input':          'fullscreen-input',
            'chat-send':           'fullscreen-send',
            'chat-presets':        'fullscreen-presets',
            'chat-character-name': 'fs-career-name',
          };
          document.getElementById = function(id) {
            return orig(map[id] || id);
          };
        } else {
          document.getElementById = orig;
        }
      }

      // ── AR HANDLERS ─────────────────────────────────────────
      window.onCareerFound = async function (career) {
        if (lostTimer) { clearTimeout(lostTimer); lostTimer = null; }
        if (isTransitioning) return;
        showBottomChat(career);
      };

      window.onCareerLost = function () {
        // Keep everything visible — do nothing
      };

      // ── TEST MODE → FULLSCREEN ───────────────────────────────
      function openTestPanel() {
        testBackdrop.classList.add('show');
        testPanel.style.display = 'block';
        setTimeout(() => testPanel.classList.add('show'), 10);
      }

      function closeTestPanel() {
        testBackdrop.classList.remove('show');
        testPanel.classList.remove('show');
        setTimeout(() => {
          if (!testPanel.classList.contains('show')) testPanel.style.display = 'none';
        }, 300);
      }

      testBtn.addEventListener('click', openTestPanel);
      closeTestBtn.addEventListener('click', closeTestPanel);
      testBackdrop.addEventListener('click', closeTestPanel);

      document.querySelectorAll('.test-career-card').forEach(card => {
        card.addEventListener('click', async () => {
          const career = JSON.parse(card.dataset.career);
          closeTestPanel();
          await showTransition(career);
          showFullscreenChat(career);
        });
      });

      // ── LANGUAGE SWITCH ──────────────────────────────────────
      window.addEventListener('localechange', () => {
        if (typeof I18N !== 'undefined') I18N.applyTranslations();

        const input = document.getElementById('chat-input');
        if (input && typeof I18N !== 'undefined') {
          input.placeholder = I18N.t('chat.placeholder', null) || 'Ask me anything...';
        }

        if (chatPanel.classList.contains('show') && currentCareerId) {
          const career = { id: currentCareerId, name: getCareerName(currentCareerId) };
          chatPanelAvatar.src = (CAREER_DATA[currentCareerId] || {}).img || '';
          remapChatIds('panel');
          if (typeof initChat === 'function') initChat(career);
        }

        transCharName.textContent = currentCareerId ? getCareerName(currentCareerId) : '';
        transCharTag.textContent  = currentCareerId ? getCareerTag(currentCareerId)  : '';
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          if (fullscreenChat.classList.contains('active')) hideFullscreenChat();
          else if (testPanel.classList.contains('show')) closeTestPanel();
          else hideBottomChat();
        }
      });

    })();
  </script>
</body>
</html>
